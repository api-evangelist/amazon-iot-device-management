vocabulary: "1.0.0"
info:
  provider: Amazon IoT Device Management
  description: Vocabulary for Amazon IoT Device Management covering all API resources and operations.
  created: "2026-04-19"
  modified: "2026-04-19"
operational:
  apis:
    - namespace: iot-device-management
      version: "2024-01-01"
      baseUrl: https://iot.amazonaws.com
      status: active
  resources:
    - name: resources
      api: iot-device-management
      actions: [list, create, delete, get, update]
  actions:
    - name: list
      methods: [GET]
      pattern: read
    - name: create
      methods: [POST]
      pattern: write
    - name: get
      methods: [GET]
      pattern: read
    - name: update
      methods: [PUT, PATCH]
      pattern: write
    - name: delete
      methods: [DELETE]
      pattern: destructive
  authentication:
    schemes:
      - type: AWS Signature Version 4
        placement: header
capability:
  workflows:
    - name: Iot Fleet Management
      file: capabilities/iot-fleet-management.yaml
      apis: [iot-device-management]
      toolCount: 8
      personas: [IoT Engineer, Operations Engineer]
  personas:
    - id: primary-persona
      name: IoT Engineer
      description: Manages Amazon IoT Device Management resources and operations
  domains:
    - name: IoT
      description: Onboard, organize, and manage IoT devices at scale.
  namespaces:
    - name: iot-device-management
      type: consumed
    - name: iot-fleet-management-api
      type: rest
      port: 8080
    - name: iot-fleet-management-mcp
      type: mcp
      port: 9090
  binds:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
crossReference:
  - resource: resources
    operations: [listthinggroups, createthinggroup, listjobs, createjob]
    workflows: [Iot Fleet Management]
    personas: [IoT Engineer, Operations Engineer]
