aid: amazon-iot-device-management
name: Amazon IoT Device Management
description: >-
  AWS IoT Device Management makes it easy to securely onboard, organize,
  monitor, and remotely manage IoT devices at scale. It enables you to register
  your connected devices individually or in bulk, and easily push updates to
  your devices to keep your fleet secure and running smoothly.
