naftiko: "1.0.0-alpha1"
info:
  label: Amazon IoT Device Management - Iot Fleet Management
  description: Unified capability for IoT Engineer, Operations Engineer to manage onboard, organize, and manage iot devices at scale operations.
  tags:
    - IoT
    - AWS
    - Device Management
    - Fleet Management
  created: "2026-04-19"
  modified: "2026-04-19"
binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
    - import: iot-device-management
      location: ./shared/iot-device-management.yaml
  exposes:
    - type: rest
      port: 8080
      namespace: iot-fleet-management-api
      description: Unified REST API for iot fleet management.
      resources:
        - path: /v1/resources
          name: resources
          description: Amazon IoT Device Management resources
          operations:
            - method: GET
              name: list-thing-groups
              description: List Thing Groups
              call: "iot-device-management.list-thing-groups"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9090
      namespace: iot-fleet-management-mcp
      transport: http
      description: MCP server for AI-assisted iot fleet management.
      tools:
        - name: list-thing-groups
          description: Amazon IoT Device Management List Thing Groups
          hints:
            readOnly: true
            openWorld: true
          call: "iot-device-management.list-thing-groups"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-thing-group
          description: Amazon IoT Device Management Create Thing Group
          hints:
            readOnly: false
            
          call: "iot-device-management.create-thing-group"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-jobs
          description: Amazon IoT Device Management List Jobs
          hints:
            readOnly: true
            openWorld: true
          call: "iot-device-management.list-jobs"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-job
          description: Amazon IoT Device Management Create Job
          hints:
            readOnly: false
            
          call: "iot-device-management.create-job"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-job
          description: Amazon IoT Device Management Describe Job
          hints:
            readOnly: true
            openWorld: true
          call: "iot-device-management.describe-job"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-job-executions
          description: Amazon IoT Device Management List Job Executions
          hints:
            readOnly: true
            openWorld: true
          call: "iot-device-management.list-job-executions"
          outputParameters:
            - type: object
              mapping: "$."

        - name: add-thing-to-group
          description: Amazon IoT Device Management Add Thing To Group
          hints:
            readOnly: false
            
          call: "iot-device-management.add-thing-to-group"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-things-in-group
          description: Amazon IoT Device Management List Things In Group
          hints:
            readOnly: true
            openWorld: true
          call: "iot-device-management.list-things-in-group"
          outputParameters:
            - type: object
              mapping: "$."
